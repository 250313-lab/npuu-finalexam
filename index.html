<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NPUU Imtihon Ruxsatnomasi</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #0088cc; --danger: #ef4444; --success: #22c55e; --bg: #f1f5f9; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); margin: 0; padding: 10px; color: #1e293b; }
        
        .header {
            background: white; padding: 15px; border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05); position: sticky; top: 10px; z-index: 100; margin-bottom: 15px;
        }
        
        input, select {
            width: 100%; padding: 12px; border: 1px solid #e2e8f0;
            border-radius: 10px; font-size: 14px; margin-bottom: 8px; outline: none; box-sizing: border-box;
        }

        .filter-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }

        .btn-fail {
            display: flex; align-items: center; justify-content: center; gap: 5px;
            padding: 10px; border-radius: 10px; border: 1px solid #fee2e2;
            background: #fff1f2; color: var(--danger); font-weight: 600; cursor: pointer; font-size: 13px;
        }
        .btn-fail.active { background: var(--danger); color: white; }

        .card {
            background: white; border-radius: 15px; padding: 15px; margin-bottom: 12px;
            border-left: 5px solid var(--primary); box-shadow: 0 2px 8px rgba(0,0,0,0.03);
        }
        .card.failed { border-left-color: var(--danger); }
        
        .student-name { font-weight: 700; font-size: 16px; color: #0f172a; display: block; margin-bottom: 10px; }
        
        .info-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; font-size: 12px; }
        .info-item { background: #f8fafc; padding: 6px 10px; border-radius: 8px; border: 1px solid #f1f5f9; }

        .status-tag {
            display: inline-block; margin-top: 10px; padding: 4px 10px; 
            border-radius: 6px; font-size: 10px; font-weight: 700; text-transform: uppercase;
        }
        .tag-pass { background: #dcfce7; color: #166534; }
        .tag-fail { background: #fee2e2; color: #991b1b; }

        #loader { text-align: center; padding: 40px; color: #64748b; font-size: 14px; }
    </style>
</head>
<body>

<div class="header">
    <input type="text" id="nameSearch" placeholder="Ism yoki Familiya...">
    <div class="filter-grid">
        <input type="text" id="groupSearch" placeholder="Guruh">
        <input type="text" id="roomSearch" placeholder="Xona">
    </div>
    <select id="subjectFilter"><option value="">Barcha fanlar</option></select>
    <div class="btn-fail" id="failToggle">🚫 Faqat ruxsat berilmaganlar</div>
</div>

<div id="loader">Ma'lumotlar bazasiga ulanmoqda...</div>
<div id="studentList"></div>

<script>
    let allStudents = [];
    let onlyFailed = false;
    
    // Siz yuborgan yangi URL manzil
    const API_URL = "https://script.google.com/macros/s/AKfycbwjfFqk_2cRJ92ceX2ncy0TbADTJ29OnwL4K-r3xZPk96qcwFrqEd6nBndbVhsW74vnFQ/exec";

    async function fetchData() {
        try {
            const response = await fetch(API_URL);
            allStudents = await response.json();
            
            // Fanlar ro'yxatini shakllantirish
            const subjects = [...new Set(allStudents.map(s => s.subject))].filter(Boolean);
            const select = document.getElementById('subjectFilter');
            subjects.forEach(sub => {
                const opt = document.createElement('option');
                opt.value = sub; opt.textContent = sub;
                select.appendChild(opt);
            });

            document.getElementById('loader').style.display = 'none';
            updateList();
        } catch (error) {
            document.getElementById('loader').innerHTML = "<b style='color:red'>Xatolik!</b><br>Ma'lumotlarni yuklab bo'lmadi.";
        }
    }

    function updateList() {
        const nameQuery = document.getElementById('nameSearch').value.toLowerCase();
        const groupQuery = document.getElementById('groupSearch').value.toLowerCase();
        const roomQuery = document.getElementById('roomSearch').value.toLowerCase();
        const subjectQuery = document.getElementById('subjectFilter').value;

        const filtered = allStudents.filter(s => {
            // "Attendance fail" yoki bo'sh bo'lmagan statuslarni tekshirish
            const isFailed = s.status.toLowerCase().includes('fail') || s.status.toLowerCase().includes('no');
            return s.name.toLowerCase().includes(nameQuery) &&
                   s.group.toString().toLowerCase().includes(groupQuery) &&
                   s.room.toString().toLowerCase().includes(roomQuery) &&
                   (subjectQuery === "" || s.subject === subjectQuery) &&
                   (!onlyFailed || isFailed);
        });

        const listDiv = document.getElementById('studentList');
        listDiv.innerHTML = filtered.length ? '' : '<p style="text-align:center; color:#94a3b8;">Ma\'lumot topilmadi</p>';

        filtered.forEach(s => {
            const isFailed = s.status.toLowerCase().includes('fail') || s.status.toLowerCase().includes('no');
            listDiv.innerHTML += `
                <div class="card ${isFailed ? 'failed' : ''}">
                    <span class="student-name">${s.name}</span>
                    <div class="info-grid">
                        <div class="info-item">👥 Guruh: ${s.group}</div>
                        <div class="info-item">📚 Fan: ${s.subject}</div>
                        <div class="info-item">📅 Sana: ${s.date}</div>
                        <div class="info-item">⏰ Vaqt: ${s.time}</div>
                        <div class="info-item">🚪 Xona: ${s.room}</div>
                    </div>
                    <span class="status-tag ${isFailed ? 'tag-fail' : 'tag-pass'}">
                        ${isFailed ? 'Attendance Fail / Ruxsat yo\'q' : 'Imtihonga ruxsat berildi'}
                    </span>
                </div>`;
        });
    }

    document.getElementById('failToggle').onclick = function() {
        onlyFailed = !onlyFailed;
        this.classList.toggle('active');
        updateList();
    };

    ['nameSearch', 'groupSearch', 'roomSearch', 'subjectFilter'].forEach(id => {
        document.getElementById(id).addEventListener('input', updateList);
    });

    // Telegram WebApp sozlamalari
    if (window.Telegram && window.Telegram.WebApp) {
        Telegram.WebApp.ready();
        Telegram.WebApp.expand();
    }

    fetchData();
</script>
</body>
</html>
