<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NPUU Imtihon Nazorati</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #0088cc; --danger: #ef4444; --success: #22c55e; --bg: #f1f5f9; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); margin: 0; padding: 12px; color: #1e293b; }
        .header { background: white; padding: 15px; border-radius: 20px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); position: sticky; top: 10px; z-index: 100; margin-bottom: 15px; }
        input, select { width: 100%; padding: 12px; border: 1.5px solid #e2e8f0; border-radius: 12px; font-size: 14px; margin-bottom: 10px; outline: none; box-sizing: border-box; background-color: white; appearance: none; }
        .filter-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .btn-fail { display: flex; align-items: center; justify-content: center; gap: 8px; padding: 12px; border-radius: 12px; border: 1px solid #fee2e2; background: #fff1f2; color: var(--danger); font-weight: 600; cursor: pointer; transition: 0.2s; margin-top: 5px; }
        .btn-fail.active { background: var(--danger); color: white; border-color: var(--danger); }
        .card { background: white; border-radius: 18px; padding: 16px; margin-bottom: 15px; border-left: 6px solid var(--primary); box-shadow: 0 4px 10px rgba(0,0,0,0.03); }
        /* Ruxsat berilmaganlar uchun maxsus dizayn */
        .card.failed { border-left-color: var(--danger); background: #fffafb; }
        .student-name { font-weight: 700; font-size: 17px; color: #0f172a; margin-bottom: 12px; display: block; }
        .info-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; font-size: 12px; }
        .info-item { background: #f8fafc; padding: 8px; border-radius: 10px; border: 1px solid #f1f5f9; }
        .tag { display: inline-block; margin-top: 12px; padding: 6px 12px; border-radius: 8px; font-size: 11px; font-weight: 700; text-transform: uppercase; }
        .tag-pass { background: #dcfce7; color: #166534; }
        .tag-fail { background: #fee2e2; color: #991b1b; }
        #loader { text-align: center; padding: 50px; color: #64748b; }
    </style>
</head>
<body>

<div class="header">
    <input type="text" id="nameSearch" placeholder="Ism yoki familiya...">
    <div class="filter-grid">
        <select id="groupSearch">
            <option value="">Barcha guruhlar</option>
            <optgroup label="FIT Guruhlari">
                <option value="FIT1">FIT 1</option><option value="FIT2">FIT 2</option><option value="FIT3">FIT 3</option>
                <option value="FIT4">FIT 4</option><option value="FIT5">FIT 5</option><option value="FIT6">FIT 6</option>
            </optgroup>
            <optgroup label="FM Guruhlari">
                <option value="FM1">FM 1</option><option value="FM2">FM 2</option><option value="FM3">FM 3</option>
                <option value="FM4">FM 4</option><option value="FM5">FM 5</option><option value="FM6">FM 6</option><option value="FM7">FM 7</option>
            </optgroup>
            <optgroup label="FAR Guruhlari">
                <option value="FAR1">FAR 1</option><option value="FAR2">FAR 2</option><option value="FAR3">FAR 3</option>
            </optgroup>
        </select>
        <select id="roomFilter"><option value="">Barcha xonalar</option></select>
    </div>
    <select id="subjectFilter"><option value="">Barcha fanlar</option></select>
    <div class="btn-fail" id="failToggle">🚫 Faqat ruxsat berilmaganlar</div>
</div>

<div id="loader">Ma'lumotlar bazasidan yuklanmoqda...</div>
<div id="studentList"></div>

<script>
    let allStudents = [];
    let onlyFailed = false;
    const API_URL = "https://script.google.com/macros/s/AKfycbwo2j58xOCcVHRbgifOZijiQl906VvM0GdeSg1ES_1mTfd8eTuUavbd8QD5cUjyZUDF8w/exec";

    async function init() {
        try {
            const res = await fetch(API_URL);
            allStudents = await res.json();
            
            // Unikal fanlar va xonalarni ajratib olish
            const subjects = [...new Set(allStudents.map(s => s.subject))].sort();
            const rooms = [...new Set(allStudents.map(s => s.room))].filter(r => r).sort();
            
            const subSelect = document.getElementById('subjectFilter');
            subjects.forEach(s => {
                const opt = document.createElement('option');
                opt.value = s; opt.textContent = s;
                subSelect.appendChild(opt);
            });

            const roomSelect = document.getElementById('roomFilter');
            rooms.forEach(r => {
                const opt = document.createElement('option');
                opt.value = r; opt.textContent = "Xona: " + r;
                roomSelect.appendChild(opt);
            });

            document.getElementById('loader').style.display = 'none';
            update();
        } catch (e) {
            document.getElementById('loader').innerHTML = "<b style='color:red'>Ulanishda xatolik yuz berdi.</b>";
        }
    }

    function update() {
        const n = document.getElementById('nameSearch').value.toLowerCase();
        const g = document.getElementById('groupSearch').value.toUpperCase();
        const r = document.getElementById('roomFilter').value.toLowerCase();
        const s = document.getElementById('subjectFilter').value;

        const filtered = allStudents.filter(st => {
            // Statusni aniqlashda xatolikni oldini olish (undefined holati uchun)
            const stStatus = (st.status || "").toLowerCase();
            const isF = stStatus.includes('fail') || stStatus.includes('no');
            
            const matchesName = st.name.toLowerCase().includes(n);
            const matchesGroup = g === "" || st.group.toString().toUpperCase().includes(g);
            const matchesRoom = r === "" || st.room.toString().toLowerCase() === r;
            const matchesSubject = s === "" || st.subject === s;

            return matchesName && matchesGroup && matchesRoom && matchesSubject && (!onlyFailed || isF);
        });

        const list = document.getElementById('studentList');
        list.innerHTML = filtered.length ? '' : '<p style="text-align:center; color:#94a3b8">Ma\'lumot topilmadi</p>';

        filtered.forEach(st => {
            const stStatus = (st.status || "").toLowerCase();
            const isF = stStatus.includes('fail') || stStatus.includes('no');
            
            list.innerHTML += `
                <div class="card ${isF ? 'failed' : ''}">
                    <span class="student-name">${st.name}</span>
                    <div class="info-grid">
                        <div class="info-item">👥 Guruh: ${st.group}</div>
                        <div class="info-item">📚 Fan: ${st.subject}</div>
                        <div class="info-item">📅 Sana: ${st.date}</div>
                        <div class="info-item">⏰ Vaqt: ${st.time}</div>
                        <div class="info-item">🚪 Xona: ${st.room}</div>
                    </div>
                    <span class="tag ${isF ? 'tag-fail' : 'tag-pass'}">
                        ${isF ? 'RUHSAT BERILMAGAN' : 'IMTIHONGA RUHSAT'}
                    </span>
                </div>`;
        });
    }

    document.getElementById('failToggle').onclick = function() {
        onlyFailed = !onlyFailed;
        this.classList.toggle('active');
        update();
    };

    // Hodisalarni kuzatish
    ['nameSearch', 'groupSearch', 'roomFilter', 'subjectFilter'].forEach(id => {
        const el = document.getElementById(id);
        el.addEventListener('input', update);
        el.addEventListener('change', update);
    });

    init();
</script>
</body>
</html>
